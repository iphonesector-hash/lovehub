server {
    listen 80;
    server_name _;  # با IP کار می‌کنه
    
    root /path/to/lovehub;  # ⚠️ مسیر پروژه رو تغییر بده
    index index.html;
    
    # فایل‌های استاتیک
    location /css/ {
        alias /path/to/lovehub/css/;
        expires 1w;
    }
    
    location /js/ {
        alias /path/to/lovehub/js/;
        expires 1w;
    }
    
    # API به Flask
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
    
    # صفحات اصلی
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location = /app {
        try_files /app.html =404;
    }
    
    # امنیت
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    
    # لاگ
    access_log /var/log/nginx/lovehub_access.log;
    error_log /var/log/nginx/lovehub_error.log;
}

